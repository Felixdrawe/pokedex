<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.7.4/lottie.min.js"></script>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="fonts.css">

    <title>Pokedex</title>
</head>

<body>
    <div class="pokemon-ambient-wall">
        <nav class="navigation-search">
            <div id="pokemon-animation"></div>
            <div class="search">
                <input type="text" placeholder="Search Pokemon">
            </div>
        </nav>

        <div class="card-container">
            
            <div class="pokemon-card-small">
                <div class="imagecontainer-card-small">
                    <img src="./gifs/1.gif" alt="">
                </div>
                <div class="info-card-small">
                    <span class="number">#001</span>
                    <h3 class="name">Bulbasaur</h3>
                    <small class="type"><span>Type: Grass</span> </small>
                </div>
            </div>


            <div class="pokemon-card-small">
                <div class="imagecontainer-card-small">
                    <img src="./gifs/2.gif" alt="">
                </div>
                <div class="info-card-small">
                    <span class="number">#002</span>
                    <h3 class="name">Ivysaur</h3>
                    <small class="type"><span>Type: Grass</span> </small>
                </div>
            </div>

            <div class="pokemon-card-small">
                <div class="imagecontainer-card-small">
                    <img src="./gifs/3.gif" alt="">
                </div>
                <div class="info-card-small">
                    <span class="number">#003</span>
                    <h3 class="name">Venusaur</h3>
                    <small class="type"><span>Type: Grass</span> </small>
                </div>
            </div>

            <div class="pokemon-card-small2">
                <div class="imagecontainer-card-small">
                    <img src="./gifs/4.gif" alt="">
                </div>
                <div class="info-card-small">
                    <span class="number">#004</span>
                    <h3 class="name">Charmander</h3>
                    <small class="type"><span>Type: fire</span> </small>
                </div>
            </div>

            <div class="pokemon-card-small2">
                <div class="imagecontainer-card-small">
                    <img src="./gifs/5.gif" alt="">
                </div>
                <div class="info-card-small">
                    <span class="number">#005</span>
                    <h3 class="name">Charmeleon</h3>
                    <small class="type"><span>Type: fire</span> </small>
                </div>
            </div>

            <div class="pokemon-card-small2">
                <div class="imagecontainer-card-small">
                    <img src="./gifs/6.gif" alt="">
                </div>
                <div class="info-card-small">
                    <span class="number">#006</span>
                    <h3 class="name">Charizard</h3>
                    <small class="type"><span>Type: fire</span> </small>
                </div>
            </div>

     




        </div>



        
    </div>

    <script src="script.js"></script>
    <script src="lottie_animation.js"></script>
</body>

</html>
